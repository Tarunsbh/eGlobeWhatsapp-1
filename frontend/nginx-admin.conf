server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare root to super-admin login
    location = / {
        return 301 /super-admin/login;
    }

    # index.html — never cache (browser must always fetch fresh to get new bundle hashes)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets (hashed filenames → safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → NestJS backend
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Super-admin SPA routes — use named location so try_files fallback
    # doesn't re-enter location matching and hit the 403 below
    location /super-admin {
        try_files $uri $uri/ @super_admin_spa;
    }

    location @super_admin_spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Block all hotel-panel routes
    location / {
        return 403;
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
}
