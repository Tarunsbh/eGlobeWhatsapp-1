services:
  # ── MySQL ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hotel_wa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hotel_wa_saas}
      MYSQL_USER: ${MYSQL_USER:-wauser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wapassword_change_me}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-apply base schema + enterprise migration on first boot
      - ./schema.sql:/docker-entrypoint-initdb.d/01_base_schema.sql:ro
      - ./backend/prisma/migrations/001_enterprise_schema.sql:/docker-entrypoint-initdb.d/02_enterprise_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_wa_net

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hotel_wa_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_change_me} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_change_me}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - hotel_wa_net

  # ── Backend (NestJS) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hotel_wa_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-wauser}:${MYSQL_PASSWORD:-wapassword_change_me}@mysql:3306/${MYSQL_DATABASE:-hotel_wa_saas}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_change_me}
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - hotel_wa_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Hotel / Tenant Panel (port 3000) ──────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: eglobewhatsapp-frontend
    container_name: hotel_wa_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/nginx-hotel.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hotel_wa_net

  # ── Super Admin Panel (port 80 → localhost/super-admin/login) ─
  admin-frontend:
    image: eglobewhatsapp-frontend
    container_name: hotel_wa_admin_frontend
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx-admin.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hotel_wa_net

  # ── ngrok tunnel (WhatsApp webhook) ───────────────────────
  # Usage:  docker compose --profile tunnel up -d
  # Then:   visit http://localhost:4040 to get the public URL
  #         Set webhook in Meta: https://<id>.ngrok-free.app/api/v1/webhook
  # Requires NGROK_AUTHTOKEN in .env  (free at https://dashboard.ngrok.com)
  # Optional: set NGROK_DOMAIN for a stable free static domain
  ngrok:
    image: ngrok/ngrok:latest
    container_name: hotel_wa_ngrok
    restart: unless-stopped
    profiles: [tunnel]
    command: >
      http backend:3001
      --log=stdout
      ${NGROK_DOMAIN:+--domain=${NGROK_DOMAIN}}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hotel_wa_net

volumes:
  mysql_data:
  redis_data:
  backend_uploads:

networks:
  hotel_wa_net:
    driver: bridge
